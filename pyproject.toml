[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chronicle-stack"
version = "0.1.0"
description = "Chronicle Core v0.1 — local-first record of context, artifacts, decisions, and diffs"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Tomoyuki Kano" }]
dependencies = [
    "typer>=0.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[project.scripts]
chronicle = "chronicle.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/chronicle"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
